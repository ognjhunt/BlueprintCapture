name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Cloud Functions: TypeScript build + test ──
  cloud-test:
    name: Cloud extract-frames (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/extract-frames/package-lock.json

      - name: Install dependencies
        working-directory: cloud/extract-frames
        run: npm ci

      - name: Build
        working-directory: cloud/extract-frames
        run: npm run build

      - name: Test
        working-directory: cloud/extract-frames
        run: npm test

  # ── Swift unit tests ──
  swift-test:
    name: Swift tests (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project BlueprintCapture.xcodeproj \
            -scheme BlueprintCapture \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -skipPackageUpdates \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project BlueprintCapture.xcodeproj \
            -scheme BlueprintCapture \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            -skipPackageUpdates

  # ── Android: build + lint test ──
  android-test:
    name: Android build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
          cache-dependency-path: android/*.gradle.kts

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew test --no-daemon --parallel

      - name: Run lint (warnings only, non-blocking)
        working-directory: android
        run: ./gradlew lint --no-daemon --parallel || true
        continue-on-error: true
